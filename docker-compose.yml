services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: shelf
      POSTGRES_PASSWORD: shelf
      POSTGRES_DB: shelf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelf"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
