name: Shelf
options:
  bundleIdPrefix: com.shelf
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  groupSortPosition: top

schemes:
  Shelf:
    build:
      targets:
        Shelf: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ShelfTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_FILE: Shelf-Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    DEVELOPMENT_TEAM: ""

targets:
  Shelf:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
      - path: Models
      - path: Views
      - path: ViewModels
      - path: Services
      - path: Components
      - path: Extensions
      - path: Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shelf.app
        INFOPLIST_FILE: Shelf-Info.plist
        CODE_SIGN_ENTITLEMENTS: Shelf.entitlements
        SWIFT_EMIT_LOC_STRINGS: "YES"
    info:
      path: Shelf-Info.plist
      properties:
        CFBundleName: Shelf
        CFBundleDisplayName: Shelf
        CFBundleIdentifier: com.shelf.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: Shelf
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        NSCameraUsageDescription: "Shelf uses your camera to scan book barcodes."
        NSPhotoLibraryUsageDescription: "Shelf needs photo access to set your profile picture."
        NSContactsUsageDescription: "Find friends who are already on Shelf."
        NSUserTrackingUsageDescription: "Shelf uses this to show you relevant book recommendations and ads."
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - shelf
            CFBundleURLName: com.shelf.app
    entitlements:
      path: Shelf.entitlements
      properties:
        com.apple.developer.applesignin:
          - default
        aps-environment: development
    dependencies:
      - package: Supabase
      - package: RevenueCat
      - package: Sentry
      - package: PostHog
      - target: ShelfShareExtension

  ShelfShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ../ShelfShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shelf.app.share
        INFOPLIST_FILE: ../ShelfShareExtension/ShareExtension-Info.plist
        SKIP_INSTALL: "YES"
    info:
      path: ../ShelfShareExtension/ShareExtension-Info.plist
      properties:
        CFBundleName: ShelfShare
        CFBundleDisplayName: Shelf
        CFBundleIdentifier: com.shelf.app.share
        CFBundleVersion: "1"
        CFBundleShortVersionString: "0.1.0"
        CFBundlePackageType: XPC!
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionActivationRule:
            NSExtensionActivationSupportsWebURLWithMaxCount: 1
            NSExtensionActivationSupportsText: true

  ShelfTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ../ShelfTests
    dependencies:
      - target: Shelf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shelf.app.tests

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: "5.0.0"
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: "8.0.0"
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"
