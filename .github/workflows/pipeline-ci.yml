name: Pipeline CI

on:
  push:
    branches: [main]
    paths: ["pipeline/**"]
  pull_request:
    branches: [main]
    paths: ["pipeline/**"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check pipeline/
      - run: ruff format --check pipeline/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt
      - run: pip install -r pipeline/requirements.txt
      - name: Run tests
        working-directory: pipeline
        run: pytest tests/ -v --tb=short
